version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: veripro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: veripro_nigeria
      POSTGRES_USER: veripro_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-strongpassword123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veripro_user -d veripro_nigeria"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - veripro_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: veripro_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - veripro_network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: veripro_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://veripro_user:${DB_PASSWORD:-strongpassword123}@postgres:5432/veripro_nigeria
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass123}@redis:6379
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - veripro_network

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: veripro_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - veripro_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  veripro_network:
    driver: bridge
