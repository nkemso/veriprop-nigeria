<!DOCTYPE html>

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO -->

    <!-- Open Graph -->

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-128.png" />
    <link rel="apple-touch-icon" sizes="76x76" href="/icons/icon-96.png" />

    <!-- iOS Splash Screens (key for iPhone/iPad install) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-startup-image" href="/icons/icon-512.png" />

    <!-- Android Chrome -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Safe area support for notched phones -->
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }
      html, body, #root {
        height: 100%;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
      }
      /* PWA install prompt styling */
      .pwa-install-banner {
        position: fixed; bottom: 0; left: 0; right: 0;
        background: #1e3a5f; color: #fff;
        padding: 1rem 1.5rem calc(1rem + var(--sab)) 1.5rem;
        display: flex; justify-content: space-between; align-items: center;
        z-index: 9999; box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
        font-family: Inter, sans-serif;
        transform: translateY(100%);
        transition: transform 0.3s ease;
      }
      .pwa-install-banner.show { transform: translateY(0); }
    </style>

    <!-- Paystack -->
    <script src="https://js.paystack.co/v1/inline.js" async></script>
    <script type="module" crossorigin src="/assets/index-COfN0LqL.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BoJkPSuX.css">
  </head>
  <body>
    <noscript>
      <div style="text-align:center;padding:2rem;font-family:sans-serif;background:#0d1117;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column">
        <div style="font-size:3rem;margin-bottom:1rem">🏠</div>
        <h1>VeriProp Nigeria</h1>
        <p>Please enable JavaScript to use VeriProp Nigeria.</p>
      </div>
    </noscript>

    <div id="root"></div>


    <!-- PWA Install Prompt -->
    <script>
      let deferredPrompt = null;

      // Capture install prompt
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;

        // Show banner after 3 seconds if not already installed
        setTimeout(() => {
          const banner = document.createElement('div');
          banner.className = 'pwa-install-banner';
          banner.innerHTML = `
            <div style="display:flex;align-items:center;gap:0.75rem">
              <img src="/icons/icon.svg" width="40" height="40" style="border-radius:8px" onerror="this.style.display='none'"/>
              <div>
                <div style="font-weight:700;font-size:0.9rem">Install VeriProp Nigeria</div>
                <div style="font-size:0.75rem;opacity:0.7">Add to home screen for the best experience</div>
              </div>
            </div>
            <div style="display:flex;gap:0.5rem">
              <button id="pwa-dismiss" style="background:rgba(255,255,255,0.15);color:#fff;border:none;padding:0.5rem 0.875rem;border-radius:0.5rem;cursor:pointer;font-size:0.8rem">Later</button>
              <button id="pwa-install" style="background:#f59e0b;color:#1e3a5f;border:none;padding:0.5rem 1rem;border-radius:0.5rem;cursor:pointer;font-weight:700;font-size:0.8rem">Install</button>
            </div>
          `;
          document.body.appendChild(banner);
          setTimeout(() => banner.classList.add('show'), 100);

          document.getElementById('pwa-install').addEventListener('click', () => {
            banner.classList.remove('show');
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
          });
          document.getElementById('pwa-dismiss').addEventListener('click', () => {
            banner.classList.remove('show');
            setTimeout(() => banner.remove(), 400);
          });
        }, 3000);
      });

      // Detect if already installed
      window.addEventListener('appinstalled', () => {
        console.log('VeriProp Nigeria installed!');
        deferredPrompt = null;
      });
    </script>
  </body>
</html>
