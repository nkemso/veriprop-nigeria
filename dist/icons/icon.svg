<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="roof" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- House -->
  <polygon points="256,80 420,220 92,220" fill="url(#roof)"/>
  <rect x="140" y="220" width="232" height="180" rx="8" fill="#ffffff" opacity="0.95"/>
  <!-- Door -->
  <rect x="218" y="300" width="76" height="100" rx="8" fill="#1e3a5f"/>
  <circle cx="285" cy="355" r="5" fill="#f59e0b"/>
  <!-- Windows -->
  <rect x="155" y="250" width="60" height="50" rx="6" fill="#1d4ed8" opacity="0.8"/>
  <rect x="297" y="250" width="60" height="50" rx="6" fill="#1d4ed8" opacity="0.8"/>
  <!-- Shield badge -->
  <circle cx="390" cy="130" r="55" fill="#10b981"/>
  <text x="390" y="148" font-size="52" text-anchor="middle" fill="white">✓</text>
  <!-- Nigeria flag colors strip at bottom -->
  <rect x="100" y="420" width="104" height="16" rx="4" fill="#008751"/>
  <rect x="204" y="420" width="104" height="16" rx="4" fill="#ffffff"/>
  <rect x="308" y="420" width="104" height="16" rx="4" fill="#008751"/>
</svg>
